<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreciScout — Compara precios de canasta familiar</title>
    <meta name="description" content="Compara precios de productos de la canasta familiar entre Éxito y Olímpica. Encuentra los mejores precios y guarda tus favoritos.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Ionicons for icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- Firebase SDKs (compat version for vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <!-- ============ NAV BAR ============ -->
    <nav class="navbar" id="navbar">
        <div class="nav-brand" id="navBrand">
            <span class="nav-logo">🟠</span>
            <span class="nav-title">PreciScout</span>
        </div>
        <div class="nav-actions">
            <!-- Logged OUT state -->
            <button id="btnGoogleLogin" class="btn-google-login" title="Iniciar sesión con Google">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                <span>Iniciar con Google</span>
            </button>
            <!-- Logged IN state (hidden by default) -->
            <button id="btnBasket" class="btn-basket hidden" title="Mi Canasta">
                <ion-icon name="basket-outline"></ion-icon>
                <span class="basket-label">Mi Canasta</span>
                <span id="basketBadge" class="basket-badge hidden">0</span>
            </button>
            <div id="userInfo" class="user-info hidden">
                <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
                <span id="userName" class="user-name"></span>
                <button id="btnLogout" class="btn-logout" title="Cerrar sesión">
                    <ion-icon name="log-out-outline"></ion-icon>
                </button>
            </div>
        </div>
    </nav>

    <!-- ============ BASKET PANEL (Sidebar) ============ -->
    <div id="basketOverlay" class="basket-overlay hidden"></div>
    <aside id="basketPanel" class="basket-panel">
        <div class="basket-panel-header">
            <h2><ion-icon name="basket"></ion-icon> Mi Canasta</h2>
            <button id="btnCloseBasket" class="btn-close-basket" title="Cerrar canasta">
                <ion-icon name="close-outline"></ion-icon>
            </button>
        </div>
        <div id="basketItems" class="basket-items">
            <!-- Items rendered dynamically -->
        </div>
        <div id="basketEmpty" class="basket-empty">
            <ion-icon name="bag-outline"></ion-icon>
            <p>Tu canasta está vacía</p>
            <span>Busca productos y agrégalos aquí</span>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="container">
        <header>
            <h1><span class="highlight">PreciScout</span></h1>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar producto de la canasta (ej: arroz, lenteja...)">
            <button id="searchBtn">
                <ion-icon name="search-outline"></ion-icon>
                Buscar
            </button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Buscando precios en Éxito y Olímpica...</p>
        </div>

        <div id="categories-section" class="categories-section">
            <h2 class="section-title">Canasta Familiar Alimentaria</h2>
            <p class="section-subtitle">Selecciona o busca un producto básico para comparar precios</p>
            <div id="categories-grid" class="categories-wrapper"></div>
        </div>

        <div id="results" class="results-grid hidden">
            <!-- Product Cards will be injected here -->
        </div>

        <div id="error-message" class="hidden">
            <p id="error-text">Ocurrió un error al buscar.</p>
        </div>
    </div>

    <!-- ============ TOAST NOTIFICATION ============ -->
    <div id="toast" class="toast hidden">
        <ion-icon name="checkmark-circle"></ion-icon>
        <span id="toastMessage">Producto agregado a tu canasta</span>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>

</html>
